<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>radiko</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d1a;
  --surface: #16162a;
  --surface2: #1e1e38;
  --border: #2a2a4a;
  --accent: #7c6af7;
  --accent2: #e94560;
  --text: #e0e0f0;
  --muted: #6b6b9a;
  --station-w: 110px;
  --row-h: 52px;
  --hour-w: 130px;
}
body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 13px; overflow: hidden; height: 100dvh; display: flex; flex-direction: column; }

/* ── Header ── */
#header { display: flex; align-items: center; gap: 10px; padding: 8px 14px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
#header h1 { font-size: 16px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
.date-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.date-nav button { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 13px; }
.date-nav button:hover { background: var(--accent); }
#date-label { font-size: 14px; font-weight: 600; min-width: 90px; text-align: center; }
#now-playing-bar { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
#now-playing-bar.active { color: #4ade80; }
#now-playing-bar .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
.btn { border: none; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-stop { background: var(--accent2); color: #fff; }
.btn-stop:hover { opacity: .85; }

/* ── Tabs ── */
#tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab { background: none; border: none; color: var(--muted); padding: 8px 18px; cursor: pointer; font-size: 13px; font-weight: 600; border-bottom: 2px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* ── Tab content ── */
.tab-panel { display: none; flex: 1; overflow: hidden; }
.tab-panel.active { display: flex; }

/* ── Timetable layout ── */
#panel-timetable { position: relative; }

/* 左カラム（放送局名）＋右スクロールエリアの 2 カラム構成 */
#timetable-outer { display: flex; flex: 1; overflow: hidden; }

#tt-left {
  width: var(--station-w); flex-shrink: 0;
  display: flex; flex-direction: column;
  background: var(--surface); border-right: 1px solid var(--border);
  z-index: 20;
}
#tt-corner {
  height: 28px; flex-shrink: 0;
  background: var(--surface); border-bottom: 1px solid var(--border);
}
#tt-station-names { flex: 1; overflow: hidden; }
.tt-station-name {
  height: var(--row-h);
  display: flex; flex-direction: column; justify-content: center; padding: 0 8px;
  border-bottom: 1px solid var(--border); cursor: pointer;
}
.tt-station-name:hover { background: var(--surface2); }
/* 再生中の放送局名を明るい緑で強調 */
.tt-station-name.playing .tt-station-id { color: #4ade80; }
.tt-station-id { font-size: 11px; font-weight: 700; color: var(--accent); }
.tt-station-fullname { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 右エリア：時間ヘッダー（sticky top）＋番組ブロック */
#tt-right { flex: 1; overflow: auto; position: relative; }
#tt-time-header {
  position: sticky; top: 0; z-index: 30;
  display: flex; height: 28px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.tt-hour {
  min-width: var(--hour-w); width: var(--hour-w); border-right: 1px solid var(--border);
  display: flex; align-items: center; padding-left: 6px; color: var(--muted); font-size: 11px; font-weight: 600;
  flex-shrink: 0;
}

/* 番組行 */
#tt-body { position: relative; }
.tt-station-row { position: relative; height: var(--row-h); border-bottom: 1px solid var(--border); }
.tt-programs { position: relative; height: var(--row-h); }
.tt-prog {
  position: absolute; top: 3px; bottom: 3px;
  border-radius: 5px; overflow: hidden; cursor: pointer;
  display: flex; align-items: center; padding: 0 6px;
  border: 1px solid transparent;
  transition: filter .15s, border-color .15s;
  font-size: 11px; font-weight: 600;
}
.tt-prog:hover { filter: brightness(1.25); border-color: #fff4; }
.tt-prog.selected { border-color: #fff8 !important; filter: brightness(1.3); }
.tt-prog-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tt-prog-pfm { font-size: 10px; font-weight: 400; opacity: .75; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: block; }

/* Grid lines */
.tt-hour-line {
  position: absolute; top: 0; bottom: 0; width: 1px; background: var(--border); pointer-events: none;
}

/* Now indicator */
#now-line {
  position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent2); pointer-events: none; z-index: 15;
  display: none;
}
#now-line::before {
  content: ''; position: absolute; top: 0; left: -4px;
  border: 5px solid transparent; border-top: 6px solid var(--accent2);
}

/* ── Program Card ── */
.btn-record { background: var(--accent); color: #fff; }
.btn-record:hover { opacity: .85; }
.btn-play { background: #22c55e; color: #fff; }
.btn-play:hover:not(:disabled) { opacity: .85; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }
.prog-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
.prog-card-top { display: flex; align-items: flex-start; gap: 12px; padding: 16px; border-bottom: 1px solid var(--border); }
.prog-card-info { flex: 1; min-width: 0; }
.prog-card-station { font-size: 11px; color: var(--accent); font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.prog-card-badge { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 20px; letter-spacing: .4px; white-space: nowrap; }
.badge-rec { background: #7f1d1d; color: #fca5a5; }
.badge-sched { background: #1e3a5f; color: #93c5fd; }
.prog-card-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; word-break: break-all; }
.prog-card-time { font-size: 12px; color: var(--muted); }
.prog-card-pfm { font-size: 11px; color: var(--muted); margin-top: 3px; }
.prog-card-artwork { width: 160px; height: 100px; flex-shrink: 0; border-radius: 8px; overflow: hidden; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 30px; }
.prog-card-artwork img { width: 100%; height: 100%; object-fit: cover; }
.prog-card-desc { padding: 12px 16px; font-size: 12px; line-height: 1.7; color: #bbb; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; border-bottom: 1px solid var(--border); }
.prog-card-actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
.prog-card-btns { display: flex; gap: 8px; }
.prog-card-btns .btn { flex: 1; padding: 8px; text-align: center; }
.prog-card-opt { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
.prog-card-opt label { cursor: pointer; }
.prog-card-opt input[type=checkbox] { accent-color: var(--accent); }
.prog-card-status { font-size: 11px; color: #4ade80; min-height: 16px; text-align: center; }

/* ── Card Modal ── */
#card-modal { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; padding: 24px; }
#card-modal.hidden { display: none; }
#card-modal-inner { width: 100%; max-width: 480px; }

/* ── Search panel ── */
#panel-search { flex-direction: column; overflow: hidden; }
#search-bar { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#search-input { flex: 1 1 200px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; color: var(--text); font-size: 14px; }
#search-input:focus { outline: none; border-color: var(--accent); }
.search-filter { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; color: var(--text); font-size: 13px; cursor: pointer; }
.search-filter:focus { outline: none; border-color: var(--accent); }
.search-aired { display: flex; align-items: center; gap: 12px; padding: 0 11px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; }
.search-aired label { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--text); cursor: pointer; white-space: nowrap; }
.search-aired input { cursor: pointer; accent-color: var(--accent); }
#search-btn { background: var(--accent); color: #fff; white-space: nowrap; }
#search-btn:hover { opacity: .85; }
#search-results { flex: 1; min-height: 0; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
#search-results .prog-card { width: 100%; max-width: 600px; flex-shrink: 0; }
.search-empty { color: var(--muted); margin-top: 40px; font-size: 13px; }
.search-count { color: var(--muted); font-size: 12px; align-self: flex-start; max-width: 600px; width: 100%; margin: 0 auto; }
mark { background: var(--accent); color: #fff; border-radius: 3px; padding: 0 2px; }

/* ── Recordings panel ── */
#panel-recordings { flex-direction: column; overflow-y: auto; padding: 16px; align-items: center; }
#recordings-list { width: 100%; max-width: 600px; }
.btn-dl { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px; cursor: pointer; font-size: 12px; font-weight: 600; flex: 1; text-align: center; }
.btn-dl:hover { background: var(--accent); border-color: var(--accent); }
.btn-del { background: none; border: 1px solid var(--accent2); color: var(--accent2); border-radius: 6px; padding: 8px; cursor: pointer; font-size: 12px; font-weight: 600; flex: 1; text-align: center; }
.btn-del:hover { background: var(--accent2); color: #fff; }

/* ── Schedules panel ── */
#panel-schedules { flex-direction: column; overflow-y: auto; padding: 16px; align-items: center; }
#schedules-list { width: 100%; max-width: 600px; }
.sched-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.sched-info { flex: 1; }
.sched-time { font-size: 12px; font-weight: 700; color: var(--accent); }
.sched-station { font-size: 12px; }
.sched-out { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-cancel { background: none; border: 1px solid var(--accent2); color: var(--accent2); border-radius: 5px; padding: 4px 10px; cursor: pointer; font-size: 11px; }
.btn-cancel:hover { background: var(--accent2); color: #fff; }
.btn-cancel-sched { background: none; border: 1px solid var(--accent2); color: var(--accent2); border-radius: 6px; padding: 8px; cursor: pointer; font-size: 12px; font-weight: 600; }
.btn-cancel-sched:hover { background: var(--accent2); color: #fff; }
.empty-msg { color: var(--muted); font-size: 13px; text-align: center; padding: 40px; }

/* ── Rules panel ── */
#panel-rules { flex-direction: column; overflow-y: auto; padding: 16px; align-items: center; }
#rules-pane { width: 100%; max-width: 600px; }
.rule-form { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 6px; }
.rule-form input[type=text] { flex: 1 1 160px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 14px; }
.rule-form input[type=text]:focus { outline: none; border-color: var(--accent); }
.rule-form #rule-add { background: var(--accent); color: #fff; white-space: nowrap; }
.rule-art { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--muted); white-space: nowrap; }
.rule-art input { accent-color: var(--accent); }
.rule-hint { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
.rule-item { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
.rule-item .rule-q { flex: 1; font-weight: 700; }
.rule-item .rule-meta { font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div id="header">
  <h1>📻 radiko</h1>
  <div class="date-nav">
    <button id="prev-day">◀</button>
    <span id="date-label">--</span>
    <button id="next-day">▶</button>
    <button id="today-btn" class="btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);">今日</button>
  </div>
  <div id="now-playing-bar">
    <span class="dot" style="display:none" id="np-dot"></span>
    <span id="np-text">--</span>
  </div>
  <button class="btn btn-stop" id="stop-btn">■ 停止</button>
</div>

<div id="tabs">
  <button class="tab active" data-tab="timetable">番組表</button>
  <button class="tab" data-tab="search">検索</button>
  <button class="tab" data-tab="recordings">録音ファイル</button>
  <button class="tab" data-tab="schedules">録音予約</button>
  <button class="tab" data-tab="rules">ルール</button>
</div>

<!-- Timetable -->
<div class="tab-panel active" id="panel-timetable">
  <div id="timetable-outer">
    <div id="tt-left">
      <div id="tt-corner"></div>
      <div id="tt-station-names"></div>
    </div>
    <div id="tt-right">
      <div id="tt-time-header"></div>
      <div id="tt-body"></div>
    </div>
  </div>
</div>

<div id="card-modal" class="hidden">
  <div id="card-modal-inner"></div>
</div>

<!-- Search -->
<div class="tab-panel" id="panel-search">
  <div id="search-bar">
    <input type="text" id="search-input" placeholder="番組名・パーソナリティ・番組情報で検索…" autocomplete="off">
    <select id="search-scope" class="search-filter">
      <option value="enabled">聴取可能な放送局のみ</option>
      <option value="all">すべての放送局</option>
    </select>
    <div id="search-aired" class="search-aired">
      <label><input type="checkbox" value="aired" checked> 放送済</label>
      <label><input type="checkbox" value="airing" checked> 放送中</label>
      <label><input type="checkbox" value="upcoming" checked> 未放送</label>
    </div>
    <button class="btn" id="search-btn">🔍 検索</button>
  </div>
  <div id="search-results">
    <div class="search-empty">キーワードを入力して検索してください</div>
  </div>
</div>

<!-- Recordings -->
<div class="tab-panel" id="panel-recordings">
  <div id="recordings-list"></div>
</div>

<!-- Reservations -->
<div class="tab-panel" id="panel-schedules">
  <div id="schedules-list"></div>
</div>

<!-- Rules (series recording) -->
<div class="tab-panel" id="panel-rules">
  <div id="rules-pane">
    <form id="rule-form" class="rule-form">
      <input type="text" id="rule-query" placeholder="番組名キーワード（例: 山下達郎）" autocomplete="off">
      <input type="text" id="rule-station" placeholder="局ID（任意・例 YFM）" autocomplete="off">
      <label class="rule-art"><input type="checkbox" id="rule-art" checked> カバーアート</label>
      <button class="btn" id="rule-add" type="submit">＋ ルール追加</button>
    </form>
    <div class="rule-hint">一致する今後の放送回が自動で予約されます。放送時刻が変わっても追従し、放送がなくなった予約は自動削除されます。</div>
    <div id="rules-list"></div>
  </div>
</div>

<script>
const HOUR_W = 130; // px per hour
const TOTAL_HOURS = 24;
const TOTAL_W = HOUR_W * TOTAL_HOURS;

let state = { dates: [], dateIdx: 0, programs: [], stations: [], selectedProg: null };

// ── Utilities ──

function fmtSize(b) {
  if (b > 1024*1024) return (b/1024/1024).toFixed(1) + ' MB';
  return (b/1024).toFixed(0) + ' KB';
}

function fmtDate(d) {
  return `${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}`;
}

function ftimeToMinutes(ftime) {
  return parseInt(ftime.slice(0,2)) * 60 + parseInt(ftime.slice(2,4));
}

function stationColor(station_id, past = false) {
  let h = 0;
  for (const c of station_id) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  const hue = (h % 360);
  return past ? `hsl(${hue},15%,18%)` : `hsl(${hue},55%,32%)`;
}

function post(url, body) {
  return fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
}

// ── Tabs ──

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
    // SSE で受信済みの最新状態から即描画（未受信なら次の push で埋まる）
    if (tab === 'recordings') renderRecordings(latest.recordings);
    if (tab === 'schedules') renderReservations(latest.reservations);
    if (tab === 'rules') renderRules(latest.rules);
    if (tab === 'search') document.getElementById('search-input').focus();
  });
});

// ── Search ──

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  const results = document.getElementById('search-results');
  if (!q) {
    results.innerHTML = '<div class="search-empty">キーワードを入力して検索してください</div>';
    return;
  }
  const scope = document.getElementById('search-scope').value;
  const aired = [...document.querySelectorAll('#search-aired input:checked')]
    .map(c => c.value).join(',');
  if (!aired) {
    results.innerHTML = '<div class="search-empty">放送状態を1つ以上選択してください</div>';
    return;
  }
  results.innerHTML = '<div class="search-empty">検索中…</div>';
  try {
    const params = new URLSearchParams({ q, scope, aired });
    const res = await fetch('/api/search?' + params);
    const data = await res.json();
    if (!data.programs.length) {
      results.innerHTML = `<div class="search-empty">「${esc(q)}」に一致する番組は見つかりませんでした</div>`;
      return;
    }
    results.innerHTML = '';
    const count = document.createElement('div');
    count.className = 'search-count';
    count.textContent = `${data.programs.length} 件ヒット` + (data.programs.length >= 300 ? '（上限300件）' : '');
    results.appendChild(count);
    for (const p of data.programs) {
      results.appendChild(createProgCard(p, { highlight: q }));
    }
  } catch (e) {
    results.innerHTML = '<div class="search-empty">❌ 検索に失敗しました</div>';
  }
}

document.getElementById('search-btn').addEventListener('click', doSearch);
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
// 絞り込み条件を変えたら即再検索（キーワード入力済みのときのみ）
document.getElementById('search-scope').addEventListener('change', () => {
  if (document.getElementById('search-input').value.trim()) doSearch();
});
document.querySelectorAll('#search-aired input').forEach(c => {
  c.addEventListener('change', () => {
    if (document.getElementById('search-input').value.trim()) doSearch();
  });
});

// ── Date navigation ──

async function init() {
  const res = await fetch('/api/dates');
  const data = await res.json();
  state.dates = data.dates;

  // default to today or nearest date
  const today = new Date();
  const todayStr = today.getFullYear().toString()
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');
  state.dateIdx = state.dates.findIndex(d => d <= todayStr);
  if (state.dateIdx < 0) state.dateIdx = 0;

  await loadDate();
  connectEvents();
  setInterval(updateNowLine, 60000);
}

async function loadDate() {
  const date = state.dates[state.dateIdx];
  document.getElementById('date-label').textContent = fmtDate(date);
  document.getElementById('prev-day').disabled = state.dateIdx >= state.dates.length - 1;
  document.getElementById('next-day').disabled = state.dateIdx <= 0;

  const [progRes, stRes] = await Promise.all([
    fetch(`/api/programs?date=${date}`),
    fetch('/api/stations'),
  ]);
  const progData = await progRes.json();
  const stData = await stRes.json();
  state.programs = progData.programs;
  state.stations = stData.stations;

  renderTimetable();
}

document.getElementById('prev-day').addEventListener('click', () => {
  if (state.dateIdx < state.dates.length - 1) { state.dateIdx++; loadDate(); }
});
document.getElementById('next-day').addEventListener('click', () => {
  if (state.dateIdx > 0) { state.dateIdx--; loadDate(); }
});
document.getElementById('today-btn').addEventListener('click', async () => {
  const today = new Date();
  const todayStr = today.getFullYear().toString()
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');
  state.dateIdx = state.dates.findIndex(d => d <= todayStr);
  if (state.dateIdx < 0) state.dateIdx = 0;
  await loadDate();
  scrollToNow();
});

// ── Timetable rendering ──

function renderTimetable() {
  renderTimeHeader();
  renderRows();
  updateNowLine();
  // 再描画で放送局名セルを作り直すと .playing が消えるので、
  // 受信済みの再生状態から緑ハイライトを貼り直す（SSE は変化時しか来ないため）
  applyNowPlaying(latest.now_playing);
  // 縦スクロールを左カラムと同期
  const right = document.getElementById('tt-right');
  right.onscroll = () => {
    document.getElementById('tt-station-names').scrollTop = right.scrollTop;
  };
}

function renderTimeHeader() {
  const el = document.getElementById('tt-time-header');
  el.style.width = TOTAL_W + 'px';
  el.innerHTML = '';
  for (let h = 0; h < TOTAL_HOURS; h++) {
    const cell = document.createElement('div');
    cell.className = 'tt-hour';
    cell.textContent = String(h).padStart(2,'0') + ':00';
    el.appendChild(cell);
  }
}

function renderRows() {
  const namesCol = document.getElementById('tt-station-names');
  const body = document.getElementById('tt-body');
  namesCol.innerHTML = '';
  body.innerHTML = '';

  const byStation = {};
  for (const p of state.programs) {
    (byStation[p.station_id] = byStation[p.station_id] || []).push(p);
  }

  for (const st of state.stations) {
    // 放送局名セル（左カラム）
    const nameEl = document.createElement('div');
    nameEl.className = 'tt-station-name';
    nameEl.dataset.stationId = st.station_id;
    nameEl.innerHTML = `<span class="tt-station-id">${esc(st.station_id)}</span><span class="tt-station-fullname">${esc(st.name)}</span>`;
    nameEl.addEventListener('click', () => {
      post('/api/playback/play', { station_id: st.station_id });  // 状態反映は SSE 経由
    });
    namesCol.appendChild(nameEl);

    // 番組ブロック行（右エリア）
    const row = document.createElement('div');
    row.className = 'tt-station-row';
    row.style.width = TOTAL_W + 'px';

    for (let h = 0; h < TOTAL_HOURS; h++) {
      const line = document.createElement('div');
      line.className = 'tt-hour-line';
      line.style.left = (h * HOUR_W) + 'px';
      row.appendChild(line);
    }

    const now = new Date();
    const date = state.dates[state.dateIdx];
    for (const p of byStation[st.station_id] || []) {
      const startMin = ftimeToMinutes(p.ftime);
      const left = (startMin / 60) * HOUR_W;
      const width = Math.max(2, (p.duration / 60) * HOUR_W) - 2;
      const block = document.createElement('div');
      block.className = 'tt-prog';
      block.dataset.progId = p.prog_id;
      block.dataset.stationId = p.station_id;
      block.style.left = left + 'px';
      block.style.width = width + 'px';
      const progStart = new Date(`${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)}T${p.ftime.slice(0,2)}:${p.ftime.slice(2,4)}:00`);
      const progEnd = new Date(progStart.getTime() + p.duration * 60000);
      block.dataset.endTs = progEnd.getTime();
      const isPast = progEnd < now;
      if (isPast) block.classList.add('past');
      block.style.background = stationColor(p.station_id, isPast);
      block.innerHTML = `<span><span class="tt-prog-title">${esc(p.title)}</span>${p.pfm ? `<span class="tt-prog-pfm">${esc(p.pfm)}</span>` : ''}</span>`;
      block.addEventListener('click', () => selectProgram(p));
      row.appendChild(block);
    }

    body.appendChild(row);
  }

  // Now line
  const nowLine = document.createElement('div');
  nowLine.id = 'now-line';
  body.appendChild(nowLine);
}

function updateNowLine() {
  const date = state.dates[state.dateIdx];
  const today = new Date();
  const todayStr = today.getFullYear().toString()
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');

  // now-line の移動に合わせて、終了済み番組の色を都度再判定する
  const nowTs = today.getTime();
  for (const block of document.querySelectorAll('.tt-prog')) {
    const isPast = Number(block.dataset.endTs) < nowTs;
    block.classList.toggle('past', isPast);
    block.style.background = stationColor(block.dataset.stationId, isPast);
  }

  const line = document.getElementById('now-line');
  if (!line) return;

  if (date !== todayStr) { line.style.display = 'none'; return; }

  const nowMin = today.getHours() * 60 + today.getMinutes();
  line.style.left = (nowMin / 60) * HOUR_W + 'px';
  line.style.top = '0';
  line.style.display = 'block';
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 検索語をエスケープ後に <mark> で囲んでハイライト
function hl(str, term) {
  const safe = esc(str);
  if (!term) return safe;
  const safeTerm = esc(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp('(' + safeTerm + ')', 'gi'), '<mark>$1</mark>');
}

// ── Program Card ──

function createProgCard(p, opts = {}) {
  const date = p.date || state.dates[state.dateIdx];
  const startH = p.ftime.slice(0,2) + ':' + p.ftime.slice(2,4);
  const endMin = ftimeToMinutes(p.ftime) + p.duration;
  const endH = String(Math.floor(endMin/60) % 24).padStart(2,'0') + ':' + String(endMin%60).padStart(2,'0');
  const now = new Date();
  const progStart = new Date(`${date.slice(0,4)}-${date.slice(4,6)}-${date.slice(6,8)}T${startH}:00`);
  const progEnd = new Date(progStart.getTime() + p.duration * 60000);
  const isFuture = progStart > now;

  let recordLabel = '今すぐ録音';
  if (progEnd < now) recordLabel = 'タイムフリー録音';
  else if (isFuture) recordLabel = 'スケジュール登録';

  // 検索結果では opts.highlight に検索語が入り、表示テキストをハイライトする
  const H = opts.highlight ? (s) => hl(s, opts.highlight) : esc;

  const card = document.createElement('div');
  card.className = 'prog-card';
  card.innerHTML = `
    <div class="prog-card-top">
      <div class="prog-card-info">
        <div class="prog-card-station">${opts.badge ? `<span class="prog-card-badge ${opts.badge.cls}">${opts.badge.label}</span>` : ''}${esc(p.station_id)}　${H(p.station_name || '')}</div>
        <div class="prog-card-title">${H(p.title)}</div>
        <div class="prog-card-time">${fmtDate(date)}　${startH}〜${endH}　(${p.duration}分)</div>
        ${p.pfm ? `<div class="prog-card-pfm">👤 ${H(p.pfm)}</div>` : ''}
      </div>
      ${p.image_url ? `<div class="prog-card-artwork"><img src="${esc(p.image_url)}" alt="" onerror="this.parentElement.remove()"></div>` : ''}
    </div>
    ${p.info ? `<div class="prog-card-desc">${H(p.info)}</div>` : ''}
    <div class="prog-card-actions">
      <div class="prog-card-btns">
        <button class="btn btn-record">${esc(recordLabel)}</button>
        <button class="btn btn-play" ${isFuture ? 'disabled' : ''}>再生</button>
      </div>
      <div class="prog-card-opt">
        <input type="checkbox" id="card-opt-art" checked>
        <label for="card-opt-art">カバーアートを埋め込む</label>
      </div>
      <div class="prog-card-status"></div>
    </div>
  `;

  if (opts.actionsEl) {
    card.querySelector('.prog-card-actions').replaceWith(opts.actionsEl);
  } else {
    const statusEl = card.querySelector('.prog-card-status');
    card.querySelector('.btn-record').addEventListener('click', async () => {
      const withArt = card.querySelector('#card-opt-art').checked;
      statusEl.textContent = '...';
      try {
        const res = await post('/api/recordings', { prog_id: p.prog_id, with_art: withArt });
        const data = await res.json();
        if (data.kind === 'reservation') statusEl.textContent = `✅ 予約登録: ${(data.target?.start_at || '').slice(0,16).replace('T',' ')}`;
        else if (data.kind === 'job') statusEl.textContent = data.method === 'timefree' ? '✅ タイムフリー録音開始' : '✅ 録音開始';
        else statusEl.textContent = JSON.stringify(data);
      } catch(e) { statusEl.textContent = '❌ エラー'; }
    });
    card.querySelector('.btn-play').addEventListener('click', () => {
      post('/api/play-program', { prog_id: p.prog_id });  // 状態反映は SSE 経由
      closeCardModal();
    });
  }

  return card;
}

function showCardModal(p) {
  document.querySelectorAll('.tt-prog.selected').forEach(el => el.classList.remove('selected'));
  document.querySelector(`.tt-prog[data-prog-id="${p.prog_id}"]`)?.classList.add('selected');
  state.selectedProg = p;

  const inner = document.getElementById('card-modal-inner');
  inner.innerHTML = '';
  inner.appendChild(createProgCard(p));
  document.getElementById('card-modal').classList.remove('hidden');
}

function closeCardModal() {
  document.getElementById('card-modal').classList.add('hidden');
  document.querySelectorAll('.tt-prog.selected').forEach(el => el.classList.remove('selected'));
  state.selectedProg = null;
}

document.getElementById('card-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeCardModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeCardModal();
});

function selectProgram(p) { showCardModal(p); }

// ── Server-pushed state (SSE) ──
// サーバ側の共有状態（再生中・録音ファイル・予約）を全ブラウザで同期する。
// 30 秒ポーリングやタブ依存ロードの代わりに、サーバの変化を即受信して再描画する。

let activeTab = 'timetable';
let latest = { now_playing: null, recordings: null, reservations: null, rules: null };

function connectEvents() {
  const es = new EventSource('/api/events');
  es.onmessage = (e) => {
    const s = JSON.parse(e.data);
    latest = s;
    applyNowPlaying(s.now_playing);
    if (activeTab === 'recordings') renderRecordings(s.recordings);
    if (activeTab === 'schedules') renderReservations(s.reservations);
    if (activeTab === 'rules') renderRules(s.rules);
  };
  // 切断時（再起動・ネットワーク断）は EventSource が自動で再接続する
}

// ── Now playing ──

function applyNowPlaying(data) {
  if (!data) return;
  const bar = document.getElementById('now-playing-bar');
  const dot = document.getElementById('np-dot');
  const txt = document.getElementById('np-text');
  if (data.playing) {
    bar.classList.add('active');
    dot.style.display = 'block';
    txt.textContent = `▶ ${data.station_id}`;
  } else {
    bar.classList.remove('active');
    dot.style.display = 'none';
    txt.textContent = '-- 停止中 --';
  }
  // 再生中の放送局名を強調表示
  const playingId = data.playing ? data.station_id : null;
  for (const el of document.querySelectorAll('.tt-station-name')) {
    el.classList.toggle('playing', el.dataset.stationId === playingId);
  }
}

document.getElementById('stop-btn').addEventListener('click', () => {
  post('/api/stop', {});  // 状態反映は SSE 経由
});

// ── Recordings ──

function makeRecordingActionsEl(rec) {
  const el = document.createElement('div');
  el.className = 'prog-card-actions';
  el.innerHTML = `
    <div class="prog-card-btns">
      <button class="btn-dl">ダウンロード</button>
      <button class="btn-del">削除</button>
    </div>
    <div style="font-size:11px;color:var(--muted);text-align:right">${fmtSize(rec.size)}</div>
  `;
  el.querySelector('.btn-dl').addEventListener('click', () => {
    window.location = `/api/recordings/${encodeURIComponent(rec.filename)}`;
  });
  el.querySelector('.btn-del').addEventListener('click', () => {
    if (!confirm(`削除しますか？\n${rec.filename}`)) return;
    fetch(`/api/recordings/${encodeURIComponent(rec.filename)}`, { method: 'DELETE' });
    // 一覧の更新は SSE 経由
  });
  return el;
}

function renderRecordings(recordings) {
  if (recordings == null) return;  // SSE 未受信
  const list = document.getElementById('recordings-list');
  if (!recordings.length) {
    list.innerHTML = '<div class="empty-msg">録音ファイルがありません</div>';
    return;
  }

  list.innerHTML = '';
  for (const rec of recordings) {
    const actionsEl = makeRecordingActionsEl(rec);
    let card;
    if (rec.prog) {
      card = createProgCard(rec.prog, { actionsEl, badge: rec.recording ? { label: '● REC', cls: 'badge-rec' } : null });
    } else {
      card = document.createElement('div');
      card.className = 'prog-card';
      card.innerHTML = `
        <div class="prog-card-top">
          <div class="prog-card-info">
            <div class="prog-card-title">${esc(rec.filename)}</div>
          </div>
        </div>`;
      card.appendChild(actionsEl);
    }
    card.style.marginBottom = '12px';
    list.appendChild(card);
  }
}

// ── Reservations（予約・state.db） ──

function resToProg(r) {
  const d = new Date(r.start_at);
  const p2 = n => String(n).padStart(2, '0');
  const date = `${d.getFullYear()}${p2(d.getMonth()+1)}${p2(d.getDate())}`;
  const ftime = `${p2(d.getHours())}${p2(d.getMinutes())}`;
  const st = (state.stations || []).find(s => s.station_id === r.station_id);
  return {
    prog_id: r.prog_id || '', station_id: r.station_id,
    station_name: st ? st.name : r.station_id,
    date, ftime, duration: r.duration_min, title: r.title || '(無題)',
  };
}

function makeReservationActionsEl(r) {
  const el = document.createElement('div');
  el.className = 'prog-card-actions';
  el.innerHTML = '<div class="prog-card-btns"><button class="btn btn-cancel-sched" style="flex:1">取り消し</button></div>';
  el.querySelector('.btn-cancel-sched').addEventListener('click', () => {
    if (!confirm('この予約を取り消しますか？')) return;
    fetch(`/api/reservations/${r.id}`, { method: 'DELETE' });  // 更新は SSE 経由
  });
  return el;
}

function renderReservations(reservations) {
  if (reservations == null) return;  // SSE 未受信
  const list = document.getElementById('schedules-list');
  if (!reservations.length) { list.innerHTML = '<div class="empty-msg">予約はありません</div>'; return; }
  list.innerHTML = '';
  for (const r of reservations) {
    const badge = r.rule_id ? { label: '🔁 シリーズ', cls: 'badge-sched' } : { label: '⏰ 予約', cls: 'badge-sched' };
    const card = createProgCard(resToProg(r), { actionsEl: makeReservationActionsEl(r), badge });
    card.style.marginBottom = '12px';
    list.appendChild(card);
  }
}

// ── Rules（タイトル定期＝シリーズ録画） ──

function renderRules(rules) {
  if (rules == null) return;
  const list = document.getElementById('rules-list');
  if (!rules.length) { list.innerHTML = '<div class="empty-msg">ルールはありません</div>'; return; }
  list.innerHTML = '';
  for (const r of rules) {
    const meta = [r.station_id ? `局:${r.station_id}` : '全局',
                  r.with_art ? 'アート' : null,
                  r.enabled ? null : '無効'].filter(Boolean).join(' / ');
    const item = document.createElement('div');
    item.className = 'rule-item';
    item.innerHTML = `<div style="flex:1"><div class="rule-q">🔁 ${esc(r.query)}</div><div class="rule-meta">${esc(meta)}</div></div>`;
    const del = document.createElement('button');
    del.className = 'btn-cancel'; del.textContent = '削除';
    del.addEventListener('click', () => {
      if (!confirm(`ルール「${r.query}」と、その未来予約を削除しますか？`)) return;
      fetch(`/api/rules/${r.id}`, { method: 'DELETE' });  // 更新は SSE 経由
    });
    item.appendChild(del);
    list.appendChild(item);
  }
}

document.getElementById('rule-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const query = document.getElementById('rule-query').value.trim();
  if (!query) return;
  const station = document.getElementById('rule-station').value.trim();
  const body = { query, with_art: document.getElementById('rule-art').checked };
  if (station) body.station_id = station;
  const btn = document.getElementById('rule-add');
  btn.disabled = true;
  try {
    await post('/api/rules', body);
    document.getElementById('rule-query').value = '';
    document.getElementById('rule-station').value = '';
  } finally {
    btn.disabled = false;
  }
  // 一覧は SSE 経由で更新
});

// ── Scroll to current time on load ──

function scrollToNow() {
  const date = state.dates[state.dateIdx];
  const today = new Date();
  const todayStr = today.getFullYear().toString()
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');
  if (date !== todayStr) return;
  const nowMin = today.getHours() * 60 + today.getMinutes();
  const right = document.getElementById('tt-right');
  right.scrollLeft = Math.max(0, (nowMin / 60) * HOUR_W - right.clientWidth / 2);
}

init().then(scrollToNow);
</script>
